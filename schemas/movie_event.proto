syntax = "proto3";

package movie.events;

option java_package = "com.example.kafka.avro";
option java_outer_classname = "MovieEventProtobuf";

enum EventType {
  VIEW_STARTED = 0;
  VIEW_FINISHED = 1;
  VIEW_PAUSED = 2;
  VIEW_RESUMED = 3;
  LIKED = 4;
  SEARCHED = 5;
}

enum DeviceType {
  MOBILE = 0;
  DESKTOP = 1;
  TV = 2;
  TABLET = 3;
}

message MovieEvent {
  string event_id = 1;
  string user_id = 2;
  string movie_id = 3;
  EventType event_type = 4;
  string timestamp = 5; // ISO 8601 UTC
  DeviceType device_type = 6;
  string session_id = 7;
  int32 progress_seconds = 8;
}
