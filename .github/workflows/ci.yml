name: CI

on: [push, pull_request]

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          pip install pytest pytest-asyncio protobuf
      - name: Generate protobuf code
        run: |
          sudo apt-get install -y protobuf-compiler
          cp schemas/movie_event.proto ./
          protoc --python_out=. movie_event.proto
      - name: Run unit tests
        run: "pytest tests/test_unit.py -v --tb=short"

  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build and push
        run: |
          docker buildx build \
            --push \
            --file tests/Dockerfile \
            --build-context schemas=schemas \
            --tag ghcr.io/vasilykuzmin/soa-hw5/test-runner:latest \
            tests/
          
          docker buildx build \
            --push \
            --file src/producer/Dockerfile \
            --build-context schemas=schemas \
            --tag ghcr.io/vasilykuzmin/soa-hw5/producer:latest \
            src/producer/

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Pull and run tests
        run: |
          docker compose -f docker-compose.yaml -f docker-compose.test.yaml pull
          docker compose -f docker-compose.yaml -f docker-compose.test.yaml up -d --no-build
          WAIT_OUTPUT=$(docker compose -f docker-compose.yaml -f docker-compose.test.yaml wait test-runner)
          EXIT_CODE=$(echo "$WAIT_OUTPUT" | grep -oE '[0-9]+' | tail -1)
          docker compose -f docker-compose.yaml -f docker-compose.test.yaml logs test-runner
          docker compose -f docker-compose.yaml -f docker-compose.test.yaml down -v
          exit "$EXIT_CODE"